language: generic
os: linux
dist: xenial  # Ubuntu 16.04.

env:
  matrix:
    - >
      EMACS_VERSION=25.1
      SHA256SUM=763344b90db4d40e9fe90c5d14748a9dbd201ce544e2cf0835ab48a0aa4a1c67
    - >
      EMACS_VERSION=25.2
      SHA256SUM=505bbd6ea6c197947001d0f80bfccb6b30e1add584d6376f54d4fd6e4de72d2d
    - >
      EMACS_VERSION=25.3
      SHA256SUM=f72c6a1b48b6fbaca2b991eed801964a208a2f8686c70940013db26cd37983c9
    - >
      EMACS_VERSION=26.1
      SHA256SUM=760382d5e8cdc5d0d079e8f754bce1136fbe1473be24bb885669b0e38fc56aa3
    - >
      EMACS_VERSION=26.2
      SHA256SUM=4f99e52a38a737556932cc57479e85c305a37a8038aaceb5156625caf102b4eb
    - >
      EMACS_VERSION=26.3
      SHA256SUM=09c747e048137c99ed35747b012910b704e0974dde4db6696fde7054ce387591
    - >
      EMACS_VERSION=27.1
      SHA256SUM=ffbfa61dc951b92cf31ebe3efc86c5a9d4411a1222b8a4ae6716cfd0e2a584db

install:
  - cd /tmp
  - wget --retry-connrefused
      "https://ftp.gnu.org/gnu/emacs/emacs-${EMACS_VERSION}.tar.gz"
  - |
    checksum="$(sha256sum "emacs-${EMACS_VERSION}.tar.gz" | cut -d ' ' -f 1)"
    if [ "${checksum}" = "${SHA256SUM}" ]; then
        echo "OK: ${checksum}"
    else
        echo "Invalid checksum: ${checksum}" >&2
        exit 1
    fi
  - tar xzf "emacs-${EMACS_VERSION}.tar.gz"
  - cd "/tmp/emacs-${EMACS_VERSION}"
  - ./configure --with-x-toolkit=no --without-x --without-all
  - sudo CFLAGS='-O2 -march=native' make install
  - emacs --version

script:
  - cd "${TRAVIS_BUILD_DIR}"
  - ./test-emacs-batch-indent
